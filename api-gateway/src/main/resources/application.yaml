server:
  port: 8089

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/quiz/**
        - id: question-service
          uri: lb://question-service
          predicates:
            - Path=/question/**




eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


